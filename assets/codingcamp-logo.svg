<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160" role="img" aria-labelledby="title desc">
  <title id="title">CodingCamp Dashboard Logo</title>
  <desc id="desc">A rounded purple logo with a clock icon and the text CodingCamp Dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="480" height="160" rx="28" fill="url(#bg)"/>
  <g transform="translate(38 30)">
    <circle cx="50" cy="50" r="46" fill="rgba(255,255,255,0.18)"/>
    <circle cx="50" cy="50" r="38" fill="#ffffff" opacity="0.96"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#4f46e5" stroke-width="4"/>
    <line x1="50" y1="50" x2="50" y2="33" stroke="#4f46e5" stroke-width="5" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="63" y2="57" stroke="#4f46e5" stroke-width="5" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="4.5" fill="#4f46e5"/>
  </g>
  <text x="150" y="72" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CodingCamp</text>
  <text x="150" y="108" fill="#e0e7ff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="500">Productivity Dashboard</text>
</svg>
