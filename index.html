<!DOCTYPE html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>My Dashboard</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <!-- Dark / Light Mode Toggle -->
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
            🌙
        </button>

        <div class="container">
            <!-- Greeting Card -->
            <div class="card greeting-card">
                <div class="time" id="clock">--:--:--</div>
                <div class="date" id="currentDate">--</div>
                <div class="greeting" id="greeting">Hello!</div>
                <button class="btn-icon" id="editNameBtn">
                    ✏️ Change Name
                </button>
            </div>

            <!-- Main Grid -->
            <div class="grid">
                <!-- Left Column -->
                <div class="left-col">
                    <!-- Focus Timer -->
                    <div class="card timer-card">
                        <h2>Focus Timer</h2>
                        <div class="timer-display" id="timerDisplay">25:00</div>
                        <div class="timer-settings">
                            <label
                                >Minutes:
                                <input
                                    type="number"
                                    id="timerMinutes"
                                    value="25"
                                    min="1"
                                    max="60"
                            /></label>
                        </div>
                        <div class="timer-controls">
                            <button class="btn btn-primary" id="startBtn">
                                Start
                            </button>
                            <button class="btn btn-secondary" id="stopBtn">
                                Stop
                            </button>
                            <button class="btn btn-secondary" id="resetBtn">
                                Reset
                            </button>
                        </div>
                    </div>

                    <!-- Quick Links -->
                    <div class="card links-card">
                        <h2>Quick Links</h2>
                        <div class="link-input-row">
                            <input
                                type="text"
                                id="linkName"
                                placeholder="Link name"
                            />
                            <input type="text" id="linkUrl" placeholder="URL" />
                            <button class="btn btn-primary" id="addLinkBtn">
                                Add Link
                            </button>
                        </div>
                        <div class="links-container" id="linksContainer"></div>
                    </div>
                </div>

                <!-- Right Column: Tasks -->
                <div class="card tasks-card">
                    <h2>Tasks</h2>
                    <div class="task-input-row">
                        <input
                            type="text"
                            id="taskInput"
                            placeholder="Add a new task..."
                        />
                        <button class="btn btn-primary" id="addTaskBtn">
                            Add
                        </button>
                    </div>
                    <div class="sort-row">
                        <label for="sortSelect">Sort:</label>
                        <select id="sortSelect">
                            <option value="default">Default</option>
                            <option value="az">A → Z</option>
                            <option value="za">Z → A</option>
                            <option value="active">Active First</option>
                            <option value="completed">Completed First</option>
                        </select>
                    </div>
                    <ul class="task-list" id="taskList"></ul>
                </div>
            </div>
        </div>

        <!-- Name Edit Modal -->
        <div class="modal-overlay" id="nameModal">
            <div class="modal-box">
                <h3>Change Your Name</h3>
                <input
                    type="text"
                    id="nameInput"
                    placeholder="Enter your name"
                />
                <div class="modal-buttons">
                    <button class="btn btn-primary" id="saveNameBtn">
                        Save
                    </button>
                    <button class="btn btn-secondary" id="cancelNameBtn">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <script src="js/app.js"></script>
    </body>
</html>
